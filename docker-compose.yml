services:
  mysql:
    image: mysql:8.0
    container_name: mood-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mood_city
      MYSQL_USER: mood_user
      MYSQL_PASSWORD: mood_password
    command: --default-storage-engine=InnoDB --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --lower_case_table_names=0 --log-bin=off
    ports:
      - "3306:3306"
    volumes:
      - ./init-metabase.sql:/docker-entrypoint-initdb.d/00-init-metabase.sql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./calculate_mood_scores.sql:/docker-entrypoint-initdb.d/02-calculate_mood_scores.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mood-network

  python:
    build: .
    container_name: mood-python
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: mood_user
      DB_PASSWORD: mood_password
      DB_NAME: mood_city
      DB_PORT: 3306
      TOMTOM_API_KEY: DrcD6yGnXculh2SBJtSCIXHBUKr13wE0
    networks:
      - mood-network
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MB_DB_TYPE: mysql
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 3306
      MB_DB_USER: mood_user
      MB_DB_PASS: mood_password
      MB_DB_HOST: mysql
    volumes:
      - ./setup-metabase.sh:/setup-metabase.sh:ro
    ports:
      - "3000:3000"
    networks:
      - mood-network
    restart: unless-stopped
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5

  metabase-init:
    image: curlimages/curl:latest
    container_name: metabase-init
    depends_on:
      metabase:
        condition: service_healthy
    networks:
      - mood-network
    volumes:
      - ./setup-metabase.sh:/setup-metabase.sh:ro
    entrypoint: sh /setup-metabase.sh
    restart: "no"

volumes:
  mysql_data:

networks:
  mood-network:
    driver: bridge
